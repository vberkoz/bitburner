<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bitburner - Secure One-Time Secret Message Sharing</title>
    <meta name="description" content="Share encrypted messages securely with one-time URLs. Messages are encrypted client-side with AES-256-GCM and automatically deleted after viewing.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bitburner.vberkoz.com/">
    <meta property="og:title" content="Bitburner - Secure One-Time Secret Message Sharing">
    <meta property="og:description" content="Share encrypted messages securely with one-time URLs. Messages are encrypted client-side with AES-256-GCM and automatically deleted after viewing.">
    <meta property="og:image" content="https://bitburner.vberkoz.com/og-image.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://bitburner.vberkoz.com/">
    <meta property="twitter:title" content="Bitburner - Secure One-Time Secret Message Sharing">
    <meta property="twitter:description" content="Share encrypted messages securely with one-time URLs. Messages are encrypted client-side with AES-256-GCM and automatically deleted after viewing.">
    <meta property="twitter:image" content="https://bitburner.vberkoz.com/og-image.png">
    
    <!-- Additional SEO -->
    <meta name="keywords" content="secure message, one-time secret, encrypted message, private message sharing, AES encryption, secure communication">
    <meta name="author" content="Bitburner">
    <link rel="canonical" href="https://bitburner.vberkoz.com/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Bitburner",
      "url": "https://bitburner.vberkoz.com",
      "description": "Share encrypted messages securely with one-time URLs. Messages are encrypted client-side with AES-256-GCM and automatically deleted after viewing.",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Client-side AES-256-GCM encryption",
        "One-time URL access",
        "Automatic message deletion after viewing",
        "24-hour TTL for unviewed messages",
        "No registration required"
      ],
      "browserRequirements": "Requires JavaScript. Requires HTML5.",
      "softwareVersion": "1.0",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "1"
      }
    }
    </script>
    
    <script data-project="bitburner" data-source="webapp" src="https://analytics.vberkoz.com/track.js"></script>
</head>
<body>
    <div class="container">
        <h1>One-Time Secret Message</h1>
        
        <div id="createSection">
            <h2>Create Secret</h2>
            <textarea id="messageInput" placeholder="Enter your secret message..."></textarea>
            <button id="createBtn">Generate One-Time URL</button>
            <div id="result" class="hidden">
                <p>Share this URL (it works only once):</p>
                <input type="text" id="secretUrl" readonly>
                <button id="copyBtn">Copy</button>
            </div>
        </div>

        <div id="viewSection" class="hidden">
            <h2>Secret Message</h2>
            <div id="messageDisplay"></div>
        </div>

        <div id="error" class="hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
